<!DOCTYPE html>
<html>

<head>
  <title>Ilmaistapahtumat</title>
</head>

<body>
  <h1> Ilmaistapahtumat</h1>
  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, id-numerosi on {{ session.user_id }}
  </p>
  {% endif %}
  <p>
    <a href="/login">Kirjaudu sisään</a>
    <a href="/register">Luo tunnus</a>
    <a href="/logout">Kirjaudu ulos</a>
  </p>
  <p>
    <a href="/new_event">Uusi tapahtuma</a>
    <a href="/find_event">Hae tapahtumaa</a>

  </p>

  <h2>Tapahtumat</h2>
  <ul>{% for event in events %}
    <li><a href="/event/{{ event.id }}">{{ event.title }}</a> </li>
    {%endfor%}
  </ul>
</body>

</html>
