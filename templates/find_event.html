<!DOCTYPE html>
<html>

<head>
  <title>Etsi tapahtuma</title>
</head>

<body>
  <h1>Etsi tapahtuma</h1>
  <form action="/find_event" method="get">
    <p>
      Hakusana: <input type="text" name="query" value="{{ query }}">
    </p>
    <input type="submit" value="Hae">
  </form>

  <p>
    <a href="/">Takaisin</a>
  </p>

  {% if query %}
  <h2>Tulokset</h2>
  {% endif %}
  <ul>
    {% for item in results %}
    <li><a href="/item/{{ item.id }}">{{ item.title }}</a></li>
    {% endfor %}
  </ul>
</body>

</html>
