<!DOCTYPE html>
<html>
<head>
  <title>Lisää kuva tapahtumalle</title>
</head>
<body>
  <h1>Lisää kuva tapahtumalle: {{ event.title }}</h1>
  {% for message in get_flashed_messages() %}
  <p>
    <b>{{ message }}</b>
  </p>
  {% endfor %}
  <form action="/add_event_image/{{ event.id }}" method="post" enctype="multipart/form-data">
    <p>
      Kuva: <input type="file" name="image" accept=".jpg" />
    </p>
    <input type="submit" value="Lähetä" />
  </form>
</body>
</html>
